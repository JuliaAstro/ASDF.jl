name: Documentation

on:
  push:
    branches:
    - main
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Clone strict branch (remove after merge)
        run: git clone --branch strict https://github.com/JuliaAstro/ASDF.jl $RUNNER_TEMP/asdf-strict
      - name: Instantiate feature branch (remove after merge)
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(path=ENV["RUNNER_TEMP"] * "/asdf-strict")
            Pkg.instantiate()
          '
      - name: Build and deploy
        uses: julia-actions/julia-docdeploy@v1
        with:
          install-package: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # If authenticating with GitHub Actions token
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }} # If authenticating with SSH deploy key
